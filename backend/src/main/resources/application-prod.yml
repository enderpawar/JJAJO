# 프로덕션: 원격 PostgreSQL (Neon, Supabase, Railway 등)
# 환경 변수 예: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD

# 크로스 오리진(프론트 → 백엔드) + iOS Safari "크로스 사이트 추적 방지" 켜진 상태에서도
# 세션 쿠키 전달되도록 SameSite=None, Secure 필수 (배포는 HTTPS 전제)
server:
  servlet:
    session:
      cookie:
        same-site: none   # none | lax | strict
        secure: true     # SameSite=None 사용 시 필수

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jjajo}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  h2:
    console:
      enabled: false

# Actuator: 배포 플랫폼 헬스체크용 (Railway/Render)
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized
